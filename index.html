<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Royale: Retro Blackjack</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --table-green: #0b4e3a; /* Sleek Casino Green */
            --accent-glow: #8b5cf6;
            --accent-glow-2: #3b82f6;
            --text-light: #f8fafc;
            --danger: #ef4444;
            --success: #10b981;
            /* Clear UI Font for Game Board */
            --clear-font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background-color: var(--bg-dark); color: var(--text-light); overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* --- Pixel Art Utilities (Only for Menus/HUD) --- */
        .pixel-text { font-family: 'VT323', monospace; text-shadow: 2px 2px 0 #000; font-size: 24px; letter-spacing: 1px; }
        .hidden { display: none !important; }
        .invisible { opacity: 0 !important; pointer-events: none; transform: scale(0.8); }

        #main-menu-view {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #1e3a8a 0%, #0f172a 100%);
            display: flex; justify-content: center; align-items: center; z-index: 50;
        }

        #game-view {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1e293b 0%, #000000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* --- Top HUD Navigation (Pixel Style) --- */
        .hud-bar {
            position: absolute; top: 0; left: 0; width: 100%; background: rgba(0,0,0,0.95);
            border-bottom: 2px solid var(--accent-glow-2); padding: 10px 40px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .hud-stat { background: #1e293b; padding: 5px 15px; border-radius: 4px; }

        /* --- The Betting Table (Clean Style) --- */
        .table-container {
            width: 1000px; height: 500px; position: relative; 
            background: radial-gradient(ellipse at center, var(--table-green) 0%, #042418 100%);
            border: 10px solid #111; border-radius: 500px 500px 40px 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 50px rgba(0,0,0,0.8);
            font-family: var(--clear-font);
        }

        .banker-station {
            position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
            width: 220px; background: rgba(0,0,0,0.7); border: 2px solid var(--accent-glow);
            border-radius: 15px; padding: 15px; text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); z-index: 10;
        }

        /* --- Dynamic Seats (Clean Style) --- */
        .seat {
            position: absolute; width: 150px; height: 160px;
            background: rgba(0, 0, 0, 0.5); border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 12px; padding: 10px; text-align: center;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 5;
        }
        .seat.occupied { border-style: solid; border-color: rgba(255,255,255,0.1); background: transparent; }
        .seat.my-turn { box-shadow: 0 0 30px #fbbf24; background: rgba(251, 191, 36, 0.1); border-color: #fbbf24; }
        .seat:hover:not(.occupied) { border-color: #fff; cursor: pointer; background: rgba(255, 255, 255, 0.1); }

        .player-name {
            font-size: 16px; font-weight: 600; color: #f8fafc; letter-spacing: 0.5px;
            background: rgba(0,0,0,0.8); padding: 4px 12px; border-radius: 20px;
            margin-bottom: 5px; border: 1px solid #333; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* --- Modern High-Def Cards --- */
        .cards-container { position: relative; display: flex; justify-content: center; gap: -30px; min-height: 80px; margin-top: 5px; }
        .card { 
            width: 55px; height: 80px; background: #fff; color: #111; border-radius: 6px; 
            display: flex; justify-content: center; align-items: center; text-align: center;
            font-size: 22px; font-weight: bold; font-family: var(--clear-font);
            border: 1px solid #ccc; box-shadow: 2px 4px 8px rgba(0,0,0,0.4); 
            margin-left: -25px;
        }
        .card.red { color: #dc2626; }
        .card:first-child { margin-left: 0; }
        
        /* Clean Value Badge */
        .value-badge {
            position: absolute; top: -12px; right: -20px;
            background: rgba(0,0,0,0.85); color: #fff; border: 2px solid #fff;
            padding: 4px 8px; font-size: 14px; font-weight: bold; font-family: var(--clear-font);
            box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 10; border-radius: 20px;
        }

        /* --- Giant Timers --- */
        .timer-display {
            position: absolute; top: 120px; left: 50%; transform: translateX(-50%);
            font-size: 30px; color: #fff; z-index: 20;
            background: rgba(220, 38, 38, 0.9); padding: 10px 30px; 
            border-radius: 30px; border: 2px solid #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            font-family: var(--clear-font); font-weight: bold; letter-spacing: 1px;
        }
        .timer-display.idle { background: rgba(234, 179, 8, 0.9); color: #000; border-color: #000; top: 180px; }

        /* --- Corner HUD Elements --- */
        .chat-container {
            position: fixed; bottom: 20px; left: 20px; width: 350px; background: rgba(15, 23, 42, 0.95);
            border: 2px solid #475569; border-radius: 10px; padding: 15px; z-index: 100;
        }
        .chat-messages { height: 130px; overflow-y: auto; margin-bottom: 10px; font-size: 18px; text-align: left; }

        .action-panel { 
            position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 100; 
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; border: 1px solid #333;
        }
        
        .action-btn { 
            background: #2563eb; color: white; padding: 12px 20px; border-radius: 6px; border: none;
            cursor: pointer; transition: 0.2s; font-family: var(--clear-font); font-weight: bold; font-size: 16px; text-transform: uppercase;
        }
        .action-btn:hover { background: #3b82f6; transform: translateY(-2px); }

        /* Persistent Stand Up Button */
        #btn-persistent-leave {
            position: fixed; top: 80px; right: 40px; background: var(--danger); border: 2px solid #fff;
            padding: 10px 20px; font-size: 16px; border-radius: 8px; box-shadow: 0 5px 10px rgba(0,0,0,0.5); z-index: 150;
        }

        input { width: 100%; padding: 10px; margin: 5px 0; background: #000; color: #fff; border: 2px solid #475569; font-family: var(--clear-font); font-size: 16px; border-radius: 5px;}
        
        /* Modals */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 200; }
        .modal-box { background: #1e293b; border: 2px solid var(--accent-glow); padding: 30px; width: 450px; text-align: center; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

    <audio id="sfx-deal" src="deal.mp3" preload="auto"></audio>

    <div id="login-modal" class="modal">
        <div class="modal-box">
            <h1 class="pixel-text" style="color: #fbbf24; margin-bottom: 20px; font-size: 40px;">NEON ROYALE</h1>
            <input type="text" id="auth-user" placeholder="USERNAME">
            <input type="password" id="auth-pass" placeholder="PASSWORD">
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="action-btn" style="flex: 1;" onclick="login()">LOGIN</button>
                <button class="action-btn" style="flex: 1; background: #475569;" onclick="showToS()">SIGN UP</button>
            </div>
            <p id="auth-error" class="pixel-text" style="color: var(--danger); margin-top: 15px;"></p>
        </div>
    </div>

    <div id="tos-modal" class="modal hidden">
        <div class="modal-box" style="width: 500px;">
            <h2 class="pixel-text" style="color: #fbbf24;">TERMS OF SERVICE</h2>
            <div style="height: 100px; overflow-y: auto; background: #000; padding: 15px; margin: 15px 0; border: 1px solid #475569; text-align: left; font-size: 16px; font-family: var(--clear-font);">
                <p>No real money is involved. Multiple accounts to farm daily rewards are strictly prohibited. 1 Seat per player limit enforced.</p>
            </div>
            <label style="font-family: var(--clear-font); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <input type="checkbox" id="tos-checkbox" style="width: 20px; height: 20px; margin:0;"> I ACCEPT
            </label>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="action-btn" style="flex: 1; background: var(--success);" onclick="signup()">CONFIRM</button>
                <button class="action-btn" style="flex: 1; background: var(--danger);" onclick="hideToS()">CANCEL</button>
            </div>
        </div>
    </div>

    <div id="main-menu-view" class="hidden">
        <div style="display: flex; flex-direction: column; gap: 20px; align-items: center;">
            <h1 class="pixel-text" style="font-size: 100px; color: #fff; margin-bottom: 20px; text-shadow: 6px 6px 0px #000, 0 0 30px var(--accent-glow);">NEON ROYALE</h1>
            <button class="action-btn pixel-text" style="width: 350px; font-size: 30px; padding: 15px;" onclick="joinTable()">[ JOIN TABLE ]</button>
            <button class="action-btn pixel-text" style="width: 350px; font-size: 30px; padding: 15px; background: #0f766e;" onclick="claimReward()">[ GET CREDITS ]</button>
            <p id="reward-msg" class="pixel-text" style="color: var(--success);"></p>
        </div>
    </div>

    <div id="game-view" class="hidden">
        
        <div class="hud-bar pixel-text">
            <div class="hud-stat">👤 <span id="hud-name" style="color:#fbbf24;"></span></div>
            <div class="hud-stat" id="game-status" style="color: var(--accent-glow-2); font-size: 30px;">PHASE: WAITING</div>
            <div class="hud-stat">💰 $<span id="hud-credits" style="color:var(--success);"></span></div>
        </div>

        <button id="btn-persistent-leave" class="action-btn hidden" onclick="leaveTable()">STAND UP</button>

        <div class="table-container">
            <div class="banker-station">
                <div class="banker-avatar">🤖</div>
                <div style="font-size: 18px; font-weight: bold; color: #f8fafc; margin-bottom: 10px;">DEALER</div>
                <div id="dealer-cards" class="cards-container"></div>
                <div id="dealer-val" class="value-badge hidden"></div>
            </div>
            
            <div id="global-timer" class="timer-display hidden">BETS CLOSING IN: <span id="g-time">15</span>s</div>
            <div id="idle-timer" class="timer-display idle hidden">PLACE BET OR LOSE SEAT: <span id="i-time">7</span>s</div>

            <div id="seats-area"></div>
        </div>

        <div class="chat-container">
            <div id="chat-messages" class="chat-messages pixel-text">
                <div style="color: #94a3b8;">System: Welcome to the table.</div>
            </div>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="chat-input" placeholder="Say something..." style="margin: 0;">
                <button class="action-btn" onclick="sendChat()">SEND</button>
            </div>
        </div>

        <div id="bet-controls" class="action-panel hidden">
            <div style="color: #fff; font-family: var(--clear-font); text-align: center; font-weight: bold;">YOUR BET</div>
            <input type="number" id="bet-amount" value="100" style="text-align: center; font-size: 20px; font-weight: bold;">
            <button class="action-btn" style="background: var(--success);" onclick="placeBet()">CONFIRM BET</button>
        </div>

        <div id="play-controls" class="action-panel hidden">
            <div style="display: flex; gap: 10px;">
                <button class="action-btn" style="flex: 1; padding: 15px 30px;" onclick="actionHit()">HIT</button>
                <button class="action-btn" style="flex: 1; background: #b45309; padding: 15px 30px;" onclick="actionStand()">STAND</button>
            </div>
            <button class="action-btn hidden" id="btn-split" style="background: var(--accent-glow-2);" onclick="actionSplit()">SPLIT</button>
        </div>
    </div>

    <script>
        const socket = io();
        let currentUser = null;
        let mySeatIndex = -1;
        let currentGameState = null;
        
        let globalTimerInt = null;
        let idleTimerInt = null;
        let lastBetCount = 0;

        function showToS() { document.getElementById('tos-modal').classList.remove('hidden'); }
        function hideToS() { document.getElementById('tos-modal').classList.add('hidden'); }

        async function login() {
            const u = document.getElementById('auth-user').value;
            const p = document.getElementById('auth-pass').value;
            const res = await fetch('/api/login', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p})
            });
            const data = await res.json();
            if(res.ok) {
                currentUser = data;
                document.getElementById('login-modal').classList.add('hidden');
                document.getElementById('main-menu-view').classList.remove('hidden');
                document.getElementById('hud-name').innerText = currentUser.username;
                document.getElementById('hud-credits').innerText = currentUser.credits;
            } else { document.getElementById('auth-error').innerText = data.error || "Login Failed"; }
        }

        async function signup() {
            if(!document.getElementById('tos-checkbox').checked) return alert("You must accept the ToS.");
            const u = document.getElementById('auth-user').value;
            const p = document.getElementById('auth-pass').value;
            const res = await fetch('/api/signup', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p, tosAccepted: true})
            });
            if(res.ok) { hideToS(); login(); } 
            else { document.getElementById('auth-error').innerText = "Signup Failed"; hideToS(); }
        }

        function claimReward() { socket.emit('claim_daily_reward', { username: currentUser.username }); }
        socket.on('reward_claimed', (data) => {
            if(data.success) {
                currentUser.credits = data.credits; 
                document.getElementById('hud-credits').innerText = currentUser.credits;
                document.getElementById('reward-msg').innerText = "+500 CREDITS ACQUIRED!";
            } else { document.getElementById('reward-msg').innerText = data.message; }
        });

        function joinTable() {
            document.getElementById('main-menu-view').classList.add('hidden');
            document.getElementById('game-view').classList.remove('hidden');
            renderTable(currentGameState);
        }

        function leaveTable() {
            document.getElementById('game-view').classList.add('hidden');
            document.getElementById('main-menu-view').classList.remove('hidden');
            document.getElementById('btn-persistent-leave').classList.add('hidden');
            if (mySeatIndex !== -1) {
                socket.disconnect();
                setTimeout(() => socket.connect(), 1000);
            }
        }

        function sendChat() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (msg && currentUser) { socket.emit('send_chat', { username: currentUser.username, message: msg }); input.value = ''; }
        }
        document.getElementById('chat-input').addEventListener('keypress', e => { if (e.key === 'Enter') sendChat(); });
        socket.on('receive_chat', data => {
            const msgs = document.getElementById('chat-messages');
            msgs.innerHTML += `<div style="margin-bottom: 5px;"><span style="color:#fbbf24;">[${data.username}]:</span> <span style="font-family: var(--clear-font); font-size: 16px;">${data.message}</span></div>`;
            msgs.scrollTop = msgs.scrollHeight;
        });

        socket.on('game_state_update', (state) => {
            currentGameState = state;
            if(currentUser && !document.getElementById('game-view').classList.contains('hidden')) {
                renderTable(state);
                manageTimers(state);
            }
        });

        function renderTable(state) {
            if (!state) return;
            
            // Clean Status Display
            const statusEl = document.getElementById('game-status');
            if(state.status === 'resolving') statusEl.innerText = 'RESULTS';
            else statusEl.innerText = `PHASE: ${state.status.toUpperCase()}`;
            
            const dCards = document.getElementById('dealer-cards'); dCards.innerHTML = '';
            const dBadge = document.getElementById('dealer-val');
            
            if (state.status === 'playing') {
                dCards.innerHTML += renderCardHTML(state.dealerCards[0]) + `<div class="card" style="background:#0f172a; border-color: #fbbf24; color: #fbbf24; font-size: 30px;">♠</div>`;
                dBadge.classList.add('hidden'); 
            } else if (state.dealerCards.length > 0) {
                state.dealerCards.forEach(c => dCards.innerHTML += renderCardHTML(c));
                dBadge.innerText = calculateValue(state.dealerCards);
                dBadge.classList.remove('hidden');
            } else { dBadge.classList.add('hidden'); }

            const seatsArea = document.getElementById('seats-area'); seatsArea.innerHTML = '';
            mySeatIndex = -1; let activeElements = [];

            state.seats.forEach((seatData, index) => {
                const seatDiv = document.createElement('div');
                seatDiv.className = 'seat';
                seatDiv.id = `seat-${index}`;

                if (!seatData) {
                    seatDiv.innerHTML = `<span style="font-size:22px; color:#94a3b8; font-family: var(--clear-font); font-weight: bold;">EMPTY</span><button class="action-btn" style="margin-top:15px; padding:8px 16px; font-size: 14px;" onclick="sitDown(${index})">SIT HERE</button>`;
                    if (state.status !== 'waiting' && state.status !== 'betting') seatDiv.classList.add('invisible');
                    else activeElements.push(seatDiv);
                } else {
                    if (seatData.username === currentUser.username) {
                        mySeatIndex = index;
                        document.getElementById('hud-credits').innerText = seatData.credits;
                        document.getElementById('btn-persistent-leave').classList.remove('hidden');
                    }
                    
                    seatDiv.classList.add('occupied');
                    if (state.activeSeatIndex === index) seatDiv.classList.add('my-turn');

                    let html = `<div class="player-name">${seatData.username}</div>`;
                    
                    seatData.hands.forEach(hand => {
                        html += `<div class="cards-container">`;
                        hand.cards.forEach(c => html += renderCardHTML(c));
                        if (hand.cards.length > 0) {
                            html += `<div class="value-badge">${hand.value || calculateValue(hand.cards)}</div>`;
                        }
                        html += `</div>`;
                        
                        // Clean Bet Display
                        if (hand.bet > 0) {
                            let betColor = "var(--success)";
                            let betText = `BET: $${hand.bet}`;
                            if (state.status === 'resolving') {
                                if (hand.status === 'bust') { betColor = "var(--danger)"; betText = "BUST"; }
                                else if (hand.status === 'blackjack') { betColor = "#fbbf24"; betText = "BLACKJACK!"; }
                            }
                            html += `<div style="font-size:14px; font-weight: bold; margin-top:15px; color:${betColor}; background: rgba(0,0,0,0.8); padding: 4px 10px; border-radius: 8px; border: 1px solid ${betColor}; font-family: var(--clear-font);">${betText}</div>`;
                        }
                    });
                    seatDiv.innerHTML = html;
                    
                    if (state.status === 'waiting' || state.status === 'betting' || state.status === 'resolving' || seatData.hands[0].bet > 0) activeElements.push(seatDiv);
                    else seatDiv.classList.add('invisible'); 
                }
                seatsArea.appendChild(seatDiv);
            });

            layoutArc(activeElements);

            document.getElementById('bet-controls').classList.add('hidden');
            document.getElementById('play-controls').classList.add('hidden');
            
            if (mySeatIndex !== -1) {
                const mySeat = state.seats[mySeatIndex];
                if (state.status === 'betting' && mySeat.hands[0].bet === 0) document.getElementById('bet-controls').classList.remove('hidden');
                if (state.status === 'playing' && state.activeSeatIndex === mySeatIndex) {
                    document.getElementById('play-controls').classList.remove('hidden');
                    const cHand = mySeat.hands[mySeat.currentHand];
                    if (cHand.cards.length === 2 && cHand.cards[0].weight === 10 && cHand.cards[1].weight === 10 && mySeat.credits >= cHand.bet) {
                        document.getElementById('btn-split').classList.remove('hidden');
                    } else { document.getElementById('btn-split').classList.add('hidden'); }
                }
            }
            if(state.status === 'playing' && document.querySelectorAll('.card').length > 0) document.getElementById('sfx-deal').play().catch(()=>{});
        }

        function manageTimers(state) {
            const gTimerUI = document.getElementById('global-timer');
            const iTimerUI = document.getElementById('idle-timer');
            
            if (state.status !== 'betting') {
                clearInterval(globalTimerInt); clearInterval(idleTimerInt);
                globalTimerInt = null; idleTimerInt = null; lastBetCount = 0;
                gTimerUI.classList.add('hidden'); iTimerUI.classList.add('hidden');
                return;
            }

            let currentBets = state.seats.filter(s => s && s.hands[0].bet > 0).length;
            if (currentBets > 0 && currentBets !== lastBetCount) {
                lastBetCount = currentBets;
                clearInterval(globalTimerInt);
                let gTime = 15;
                gTimerUI.classList.remove('hidden');
                document.getElementById('g-time').innerText = gTime;
                
                globalTimerInt = setInterval(() => {
                    gTime--; document.getElementById('g-time').innerText = gTime;
                    if (gTime <= 0) {
                        clearInterval(globalTimerInt); gTimerUI.classList.add('hidden');
                        if (mySeatIndex !== -1 && state.seats[mySeatIndex].hands[0].bet === 0) {
                             socket.emit('place_bet', { seatIndex: mySeatIndex, betAmount: 0 }); 
                        }
                    }
                }, 1000);
            }

            if (mySeatIndex !== -1 && state.seats[mySeatIndex].hands[0].bet === 0) {
                if (!idleTimerInt) {
                    let iTime = 7;
                    iTimerUI.classList.remove('hidden');
                    document.getElementById('i-time').innerText = iTime;
                    idleTimerInt = setInterval(() => {
                        iTime--; document.getElementById('i-time').innerText = iTime;
                        if (iTime <= 0) {
                            clearInterval(idleTimerInt); iTimerUI.classList.add('hidden');
                            leaveTable(); 
                        }
                    }, 1000);
                }
            } else {
                clearInterval(idleTimerInt); idleTimerInt = null; iTimerUI.classList.add('hidden');
            }
        }

        function layoutArc(elements) {
            const count = elements.length; if (count === 0) return;
            const centerX = 500; const centerY = 60; const radiusX = 400; const radiusY = 320; 

            elements.forEach((el, i) => {
                let angle;
                if (count === 1) angle = Math.PI / 2;
                else {
                    const startAngle = Math.PI * 0.85; const endAngle = Math.PI * 0.15;
                    angle = startAngle - (i * ((startAngle - endAngle) / (count - 1)));
                }
                const x = centerX + Math.cos(angle) * radiusX - 75; 
                const y = centerY + Math.sin(angle) * radiusY - 80;
                el.style.left = `${x}px`; el.style.top = `${y}px`;
            });
        }

        function renderCardHTML(card) {
            if(!card) return `<div class="card" style="background:#475569;">?</div>`;
            const color = ['Hearts', 'Diamonds'].includes(card.suit) ? 'red' : 'black';
            const suitMap = { 'Hearts': '♥', 'Diamonds': '♦', 'Clubs': '♣', 'Spades': '♠' };
            return `<div class="card ${color}">${card.value}<br><span style="font-size:28px;">${suitMap[card.suit]}</span></div>`;
        }
        
        function calculateValue(cards) {
            let val = 0; let aces = 0;
            cards.forEach(c => { val += c.weight; if(c.value==='A') aces++; });
            while(val > 21 && aces > 0) { val -= 10; aces--; } return val;
        }

        function sitDown(index) { 
            if (mySeatIndex !== -1) return alert("You can only take one seat at a time.");
            socket.emit('join_seat', { username: currentUser.username, seatIndex: index }); 
        }
        function placeBet() { const amt = parseInt(document.getElementById('bet-amount').value); socket.emit('place_bet', { seatIndex: mySeatIndex, betAmount: amt }); }
        function actionHit() { socket.emit('player_action_hit', { seatIndex: mySeatIndex }); }
        function actionStand() { socket.emit('player_action_stand', { seatIndex: mySeatIndex }); }
        function actionSplit() { socket.emit('player_action_split', { seatIndex: mySeatIndex }); }
    </script>
</body>
