<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Royale: Retro Blackjack</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --table-green: #0d5c46;
            --table-border: #4a2b18;
            --accent-glow: #8b5cf6;
            --accent-glow-2: #3b82f6;
            --text-light: #f8fafc;
            --wood-base: #8b5a2b;
            --wood-dark: #5c3a21;
            --wood-light: #a06b35;
            --danger: #ef4444;
            --success: #10b981;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'VT323', monospace; user-select: none; }
        body { background-color: var(--bg-dark); color: var(--text-light); overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* --- Pixel Art Utilities --- */
        .pixel-text { text-shadow: 2px 2px 0 #000; font-size: 24px; letter-spacing: 1px; }
        .hidden { display: none !important; }
        .invisible { opacity: 0 !important; pointer-events: none; transform: scale(0.8); }

        /* --- View Containers --- */
        #main-menu-view {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #1e3a8a 0%, #0f172a 100%);
            display: flex; justify-content: center; align-items: center; z-index: 50;
        }

        /* Centered Game View */
        #game-view {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1e293b 0%, #000000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* --- Top HUD Navigation --- */
        .hud-bar {
            position: absolute; top: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9);
            border-bottom: 4px solid var(--wood-base); padding: 10px 40px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        .hud-stat { background: #1e293b; border: 2px solid #475569; padding: 5px 15px; border-radius: 4px; }

        /* --- The Betting Table & Banker --- */
        .table-container {
            width: 1000px; height: 500px; position: relative; 
            background: radial-gradient(ellipse at center, var(--table-green) 0%, #042f20 100%);
            border: 20px solid var(--table-border); border-radius: 500px 500px 40px 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 50px rgba(0,0,0,0.8);
        }

        .banker-station {
            position: absolute; top: -70px; left: 50%; transform: translateX(-50%);
            width: 200px; background: #0f172a; border: 4px solid var(--accent-glow);
            border-radius: 10px; padding: 10px; text-align: center;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.6), inset 0 0 15px #000; z-index: 10;
        }
        
        .banker-avatar { font-size: 50px; line-height: 1; margin-bottom: 5px; filter: drop-shadow(0 0 10px var(--accent-glow)); }

        /* --- Dynamic Seats --- */
        .seat {
            position: absolute; width: 140px; height: 150px;
            background: rgba(15, 23, 42, 0.9); border: 4px dashed #475569;
            border-radius: 10px; padding: 10px; text-align: center;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7); z-index: 5;
        }
        .seat.occupied { border-style: solid; border-color: var(--accent-glow-2); background: rgba(0,0,0,0.8); }
        .seat:hover:not(.occupied) { border-color: #fff; cursor: pointer; background: rgba(59, 130, 246, 0.3); }

        /* --- Pixel Art Cards & Badges --- */
        .cards-container { position: relative; display: flex; justify-content: center; gap: -25px; min-height: 70px; margin-top: 10px; }
        .card { 
            width: 50px; height: 75px; background: #f8fafc; color: #000; border-radius: 4px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 26px; font-weight: bold; font-family: 'VT323';
            border: 3px solid #000; margin-left: -20px;
            box-shadow: 3px 3px 0 #000; /* Pixel shadow */
        }
        .card.red { color: #ef4444; }
        .card:first-child { margin-left: 0; }
        
        /* The Total Value Badge */
        .value-badge {
            position: absolute; top: -15px; right: -25px;
            background: #fbbf24; color: #000; border: 3px solid #000;
            padding: 2px 8px; font-size: 20px; font-weight: bold;
            box-shadow: 2px 2px 0 #000; z-index: 10; border-radius: 4px;
        }

        /* --- Timer Displays --- */
        .timer-display {
            position: absolute; top: 150px; left: 50%; transform: translateX(-50%);
            font-size: 40px; color: #fbbf24; text-shadow: 4px 4px 0 #000; z-index: 20;
            background: rgba(0,0,0,0.6); padding: 5px 20px; border-radius: 10px; border: 2px solid #fbbf24;
        }

        /* --- Corner HUD Elements --- */
        .chat-container {
            position: fixed; bottom: 20px; left: 20px; width: 350px; background: rgba(15, 23, 42, 0.95);
            border: 4px solid #475569; border-radius: 5px; padding: 15px; z-index: 100;
            box-shadow: 5px 5px 0 #000;
        }
        .chat-messages { height: 150px; overflow-y: auto; margin-bottom: 10px; font-size: 20px; text-shadow: 1px 1px 0 #000; text-align: left; }

        .action-panel { 
            position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 100; 
            background: rgba(15, 23, 42, 0.95); padding: 15px; border: 4px solid var(--accent-glow-2);
            border-radius: 5px; box-shadow: 5px 5px 0 #000;
        }
        .action-btn { background: var(--wood-base); border: 3px solid #000; color: white; padding: 10px 25px; font-size: 24px; cursor: pointer; box-shadow: 3px 3px 0 #000; transition: 0.1s; text-transform: uppercase;}
        .action-btn:hover { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #000; filter: brightness(1.2); }
        .action-btn:active { transform: translate(3px, 3px); box-shadow: 0 0 0 #000; }

        input { width: 100%; padding: 10px; margin: 5px 0; background: #000; color: #fff; border: 3px solid #475569; font-family: 'VT323'; font-size: 22px;}
        
        /* Modals */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 200; }
        .modal-box { background: #1e293b; border: 6px solid var(--accent-glow); padding: 30px; width: 450px; text-align: center; border-radius: 10px; box-shadow: 10px 10px 0 #000; }
    </style>
</head>
<body>

    <audio id="sfx-deal" src="deal.mp3" preload="auto"></audio>
    <audio id="sfx-win" src="win.mp3" preload="auto"></audio>

    <div id="login-modal" class="modal">
        <div class="modal-box">
            <h1 class="pixel-text" style="color: #fbbf24; margin-bottom: 20px; font-size: 40px;">NEON ROYALE</h1>
            <input type="text" id="auth-user" placeholder="USERNAME">
            <input type="password" id="auth-pass" placeholder="PASSWORD">
            
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="action-btn pixel-text" style="flex: 1;" onclick="login()">LOGIN</button>
                <button class="action-btn pixel-text" style="flex: 1; background: #475569;" onclick="showToS()">SIGN UP</button>
            </div>
            <p id="auth-error" class="pixel-text" style="color: var(--danger); margin-top: 15px;"></p>
        </div>
    </div>

    <div id="tos-modal" class="modal hidden">
        <div class="modal-box" style="width: 500px;">
            <h2 class="pixel-text" style="color: #fbbf24;">TERMS OF SERVICE</h2>
            <div style="height: 150px; overflow-y: auto; background: #000; padding: 15px; margin: 15px 0; border: 3px solid #475569; text-align: left; font-size: 20px; line-height: 1.2;">
                <p>No real money is involved. Multiple accounts to farm daily rewards are strictly prohibited. 1 Seat per player limit enforced.</p>
            </div>
            <label class="pixel-text" style="font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <input type="checkbox" id="tos-checkbox" style="width: 25px; height: 25px; margin:0;"> I ACCEPT
            </label>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="action-btn pixel-text" style="flex: 1; background: var(--success);" onclick="signup()">CONFIRM</button>
                <button class="action-btn pixel-text" style="flex: 1; background: var(--danger);" onclick="hideToS()">CANCEL</button>
            </div>
        </div>
    </div>

    <div id="main-menu-view" class="hidden">
        <div style="display: flex; flex-direction: column; gap: 20px; align-items: center;">
            <h1 class="pixel-text" style="font-size: 100px; color: #fff; margin-bottom: 20px; text-shadow: 6px 6px 0px #000, 0 0 30px var(--accent-glow);">NEON ROYALE</h1>
            <button class="action-btn pixel-text" style="width: 350px; font-size: 30px;" onclick="joinTable()">[ JOIN TABLE ]</button>
            <button class="action-btn pixel-text" style="width: 350px; font-size: 30px; background: #0f766e;" onclick="claimReward()">[ GET CREDITS ]</button>
            <p id="reward-msg" class="pixel-text" style="color: var(--success); text-shadow: 2px 2px 0 #000;"></p>
        </div>
    </div>

    <div id="game-view" class="hidden">
        
        <div class="hud-bar pixel-text">
            <div class="hud-stat">👤 <span id="hud-name" style="color:#fbbf24;"></span></div>
            <div class="hud-stat" id="game-status" style="color: var(--accent-glow-2); font-size: 30px;">PHASE: WAITING</div>
            <div class="hud-stat">💰 $<span id="hud-credits" style="color:var(--success);"></span></div>
        </div>

        <div class="table-container">
            <div class="banker-station">
                <div class="banker-avatar">🤖</div>
                <div class="pixel-text" style="font-size: 28px; color: var(--accent-glow);">THE BANKER</div>
                <div id="dealer-cards" class="cards-container"></div>
                <div id="dealer-val" class="value-badge hidden"></div>
            </div>
            
            <div id="global-timer" class="timer-display hidden">BETS CLOSING: <span id="g-time">15</span>s</div>
            <div id="idle-timer" class="timer-display hidden" style="color: var(--danger); border-color: var(--danger); top: 220px;">PLACE BET OR LOSE SEAT: <span id="i-time">7</span>s</div>

            <div id="seats-area"></div>
        </div>

        <div class="chat-container">
            <div id="chat-messages" class="chat-messages pixel-text">
                <div style="color: #94a3b8;">System: Welcome to the table.</div>
            </div>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="chat-input" placeholder="TALK..." style="margin: 0;">
                <button class="action-btn pixel-text" style="padding: 10px; font-size: 20px;" onclick="sendChat()">SEND</button>
            </div>
        </div>

        <div id="bet-controls" class="action-panel hidden">
            <input type="number" id="bet-amount" value="100" style="text-align: center;">
            <button class="action-btn pixel-text" style="background: var(--success);" onclick="placeBet()">PLACE BET</button>
            <button class="action-btn pixel-text" style="background: var(--danger);" onclick="leaveTable()">STAND UP</button>
        </div>

        <div id="play-controls" class="action-panel hidden">
            <div style="display: flex; gap: 10px;">
                <button class="action-btn pixel-text" style="flex: 1;" onclick="actionHit()">HIT</button>
                <button class="action-btn pixel-text" style="flex: 1; background: #b45309;" onclick="actionStand()">STAND</button>
            </div>
            <button class="action-btn pixel-text hidden" id="btn-split" style="background: var(--accent-glow-2);" onclick="actionSplit()">SPLIT</button>
        </div>
    </div>

    <script>
        const socket = io();
        let currentUser = null;
        let mySeatIndex = -1;
        let currentGameState = null;
        
        // Timer Variables
        let globalTimerInt = null;
        let idleTimerInt = null;
        let lastBetCount = 0;

        // --- Auth & Modals ---
        function showToS() { document.getElementById('tos-modal').classList.remove('hidden'); }
        function hideToS() { document.getElementById('tos-modal').classList.add('hidden'); }

        async function login() {
            const u = document.getElementById('auth-user').value;
            const p = document.getElementById('auth-pass').value;
            const res = await fetch('/api/login', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p})
            });
            const data = await res.json();
            if(res.ok) {
                currentUser = data;
                document.getElementById('login-modal').classList.add('hidden');
                document.getElementById('main-menu-view').classList.remove('hidden');
                document.getElementById('hud-name').innerText = currentUser.username;
                document.getElementById('hud-credits').innerText = currentUser.credits;
            } else { document.getElementById('auth-error').innerText = data.error || "Login Failed"; }
        }

        async function signup() {
            if(!document.getElementById('tos-checkbox').checked) return alert("YOU MUST ACCEPT THE TOS.");
            const u = document.getElementById('auth-user').value;
            const p = document.getElementById('auth-pass').value;
            const res = await fetch('/api/signup', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p, tosAccepted: true})
            });
            if(res.ok) { hideToS(); login(); } 
            else { document.getElementById('auth-error').innerText = "Signup Failed"; hideToS(); }
        }

        // --- Daily Rewards ---
        function claimReward() { socket.emit('claim_daily_reward', { username: currentUser.username }); }
        socket.on('reward_claimed', (data) => {
            if(data.success) {
                currentUser.credits = data.credits; 
                document.getElementById('hud-credits').innerText = currentUser.credits;
                document.getElementById('reward-msg').innerText = "+500 CREDITS ACQUIRED!";
                document.getElementById('sfx-win').play().catch(()=>{});
            } else { document.getElementById('reward-msg').innerText = data.message; }
        });

        // --- Navigation ---
        function joinTable() {
            document.getElementById('main-menu-view').classList.add('hidden');
            document.getElementById('game-view').classList.remove('hidden');
            renderTable(currentGameState);
        }

        function leaveTable() {
            // Client-side visual stand up
            document.getElementById('game-view').classList.add('hidden');
            document.getElementById('main-menu-view').classList.remove('hidden');
            
            // Send socket disconnect to backend to clear seat, then reconnect
            if (mySeatIndex !== -1) {
                socket.disconnect();
                setTimeout(() => socket.connect(), 1000);
            }
        }

        // --- Chat System ---
        function sendChat() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (msg && currentUser) { socket.emit('send_chat', { username: currentUser.username, message: msg }); input.value = ''; }
        }
        document.getElementById('chat-input').addEventListener('keypress', e => { if (e.key === 'Enter') sendChat(); });
        socket.on('receive_chat', data => {
            const msgs = document.getElementById('chat-messages');
            msgs.innerHTML += `<div style="margin-bottom: 5px;"><span style="color:#fbbf24;">[${data.username}]:</span> ${data.message}</div>`;
            msgs.scrollTop = msgs.scrollHeight;
        });

        // --- Core Socket Receiver & Rendering ---
        socket.on('game_state_update', (state) => {
            currentGameState = state;
            if(currentUser && !document.getElementById('game-view').classList.contains('hidden')) {
                renderTable(state);
                manageTimers(state);
            }
        });

        function renderTable(state) {
            if (!state) return;
            document.getElementById('game-status').innerText = `PHASE: ${state.status.toUpperCase()}`;
            
            // Dealer rendering with Pixel Value Badge
            const dCards = document.getElementById('dealer-cards'); dCards.innerHTML = '';
            const dBadge = document.getElementById('dealer-val');
            
            if (state.status === 'playing') {
                dCards.innerHTML += renderCardHTML(state.dealerCards[0]) + `<div class="card" style="background:#475569;">?</div>`;
                dBadge.classList.add('hidden'); // Hide badge while hole card is down
            } else if (state.dealerCards.length > 0) {
                state.dealerCards.forEach(c => dCards.innerHTML += renderCardHTML(c));
                dBadge.innerText = calculateValue(state.dealerCards);
                dBadge.classList.remove('hidden');
            } else { dBadge.classList.add('hidden'); }

            // Seats
            const seatsArea = document.getElementById('seats-area'); seatsArea.innerHTML = '';
            mySeatIndex = -1; let activeElements = [];

            state.seats.forEach((seatData, index) => {
                const seatDiv = document.createElement('div');
                seatDiv.className = 'seat pixel-text';
                seatDiv.id = `seat-${index}`;

                if (!seatData) {
                    seatDiv.innerHTML = `<span style="font-size:22px; color:#94a3b8;">EMPTY</span><button class="action-btn" style="margin-top:10px; font-size:18px; padding:5px 15px;" onclick="sitDown(${index})">SIT</button>`;
                    if (state.status !== 'waiting' && state.status !== 'betting') seatDiv.classList.add('invisible');
                    else activeElements.push(seatDiv);
                } else {
                    if (seatData.username === currentUser.username) {
                        mySeatIndex = index;
                        document.getElementById('hud-credits').innerText = seatData.credits;
                    }
                    seatDiv.classList.add('occupied');
                    if (state.activeSeatIndex === index) seatDiv.style.boxShadow = '0 0 30px #fbbf24';

                    let html = `<div style="color:#fbbf24; font-size:24px; border-bottom: 2px solid #475569; width: 100%; padding-bottom: 5px;">${seatData.username}</div>`;
                    
                    seatData.hands.forEach(hand => {
                        html += `<div class="cards-container">`;
                        hand.cards.forEach(c => html += renderCardHTML(c));
                        
                        // Pixel Value Badge for Player Hand
                        if (hand.cards.length > 0) {
                            html += `<div class="value-badge">${hand.value || calculateValue(hand.cards)}</div>`;
                        }
                        html += `</div>`;
                        
                        if (hand.bet > 0) html += `<div style="font-size:20px; margin-top:15px; color:var(--success); background: #000; padding: 2px 10px; border-radius: 5px; border: 2px solid var(--success);">BET: $${hand.bet}</div>`;
                    });
                    seatDiv.innerHTML = html;
                    
                    if (state.status === 'waiting' || state.status === 'betting' || seatData.hands[0].bet > 0) activeElements.push(seatDiv);
                    else seatDiv.classList.add('invisible'); 
                }
                seatsArea.appendChild(seatDiv);
            });

            layoutArc(activeElements);

            // Controls Toggling
            document.getElementById('bet-controls').classList.add('hidden');
            document.getElementById('play-controls').classList.add('hidden');
            
            if (mySeatIndex !== -1) {
                const mySeat = state.seats[mySeatIndex];
                if (state.status === 'betting' && mySeat.hands[0].bet === 0) document.getElementById('bet-controls').classList.remove('hidden');
                if (state.status === 'playing' && state.activeSeatIndex === mySeatIndex) {
                    document.getElementById('play-controls').classList.remove('hidden');
                    const cHand = mySeat.hands[mySeat.currentHand];
                    if (cHand.cards.length === 2 && cHand.cards[0].weight === 10 && cHand.cards[1].weight === 10 && mySeat.credits >= cHand.bet) {
                        document.getElementById('btn-split').classList.remove('hidden');
                    } else { document.getElementById('btn-split').classList.add('hidden'); }
                }
            }
            if(state.status === 'playing' && document.querySelectorAll('.card').length > 0) document.getElementById('sfx-deal').play().catch(()=>{});
        }

        // --- Client-Side Timer Logic ---
        function manageTimers(state) {
            const gTimerUI = document.getElementById('global-timer');
            const iTimerUI = document.getElementById('idle-timer');
            
            if (state.status !== 'betting') {
                clearInterval(globalTimerInt); clearInterval(idleTimerInt);
                globalTimerInt = null; idleTimerInt = null;
                gTimerUI.classList.add('hidden'); iTimerUI.classList.add('hidden');
                return;
            }

            // 15s Global Start Timer
            let currentBets = state.seats.filter(s => s && s.hands[0].bet > 0).length;
            if (currentBets > 0 && currentBets !== lastBetCount) {
                // Someone new placed a bet, reset 15s timer
                lastBetCount = currentBets;
                clearInterval(globalTimerInt);
                let gTime = 15;
                gTimerUI.classList.remove('hidden');
                document.getElementById('g-time').innerText = gTime;
                
                globalTimerInt = setInterval(() => {
                    gTime--; document.getElementById('g-time').innerText = gTime;
                    if (gTime <= 0) {
                        clearInterval(globalTimerInt); gTimerUI.classList.add('hidden');
                        // Backend requires 'place_bet' to check state. We emit a 0 bet to trigger a state check.
                        if (mySeatIndex !== -1 && state.seats[mySeatIndex].hands[0].bet > 0) {
                             socket.emit('place_bet', { seatIndex: mySeatIndex, betAmount: 0 }); 
                        }
                    }
                }, 1000);
            }

            // 7s Idle Kick Timer
            if (mySeatIndex !== -1 && state.seats[mySeatIndex].hands[0].bet === 0) {
                if (!idleTimerInt) {
                    let iTime = 7;
                    iTimerUI.classList.remove('hidden');
                    document.getElementById('i-time').innerText = iTime;
                    idleTimerInt = setInterval(() => {
                        iTime--; document.getElementById('i-time').innerText = iTime;
                        if (iTime <= 0) {
                            clearInterval(idleTimerInt); iTimerUI.classList.add('hidden');
                            leaveTable(); // Kick user out of seat back to main menu
                        }
                    }, 1000);
                }
            } else {
                clearInterval(idleTimerInt); idleTimerInt = null; iTimerUI.classList.add('hidden');
            }
        }

        // Dynamic Arc Math
        function layoutArc(elements) {
            const count = elements.length; if (count === 0) return;
            const centerX = 500; const centerY = 60; const radiusX = 400; const radiusY = 320; 

            elements.forEach((el, i) => {
                let angle;
                if (count === 1) angle = Math.PI / 2;
                else {
                    const startAngle = Math.PI * 0.85; const endAngle = Math.PI * 0.15;
                    angle = startAngle - (i * ((startAngle - endAngle) / (count - 1)));
                }
                const x = centerX + Math.cos(angle) * radiusX - 70; 
                const y = centerY + Math.sin(angle) * radiusY - 75;
                el.style.left = `${x}px`; el.style.top = `${y}px`;
            });
        }

        // Game Actions & Helpers
        function renderCardHTML(card) {
            if(!card) return `<div class="card" style="background:#475569;">?</div>`;
            const color = ['Hearts', 'Diamonds'].includes(card.suit) ? 'red' : 'black';
            const suitMap = { 'Hearts': '♥', 'Diamonds': '♦', 'Clubs': '♣', 'Spades': '♠' };
            return `<div class="card ${color}">${card.value}<br>${suitMap[card.suit]}</div>`;
        }
        
        function calculateValue(cards) {
            let val = 0; let aces = 0;
            cards.forEach(c => { val += c.weight; if(c.value==='A') aces++; });
            while(val > 21 && aces > 0) { val -= 10; aces--; } return val;
        }

        function sitDown(index) { 
            if (mySeatIndex !== -1) return alert("YOU CAN ONLY TAKE ONE SEAT AT A TIME.");
            socket.emit('join_seat', { username: currentUser.username, seatIndex: index }); 
        }
        function placeBet() { const amt = parseInt(document.getElementById('bet-amount').value); socket.emit('place_bet', { seatIndex: mySeatIndex, betAmount: amt }); }
        function actionHit() { socket.emit('player_action_hit', { seatIndex: mySeatIndex }); }
        function actionStand() { socket.emit('player_action_stand', { seatIndex: mySeatIndex }); }
        function actionSplit() { socket.emit('player_action_split', { seatIndex: mySeatIndex }); }
    </script>
</body>
</html>
