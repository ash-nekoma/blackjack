<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Royale - Admin Terminal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #1e293b; padding: 20px; border-radius: 8px; border: 2px solid #3b82f6; }
        h1, h2 { color: #fbbf24; }
        .auth-panel { display: flex; gap: 10px; margin-bottom: 20px; }
        input { padding: 8px; background: #000; color: #fff; border: 1px solid #475569; border-radius: 4px; }
        button { background: #3b82f6; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #2563eb; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #000; }
        th, td { padding: 10px; text-align: left; border: 1px solid #333; }
        th { background: #020617; color: #3b82f6; }
        .section { margin-top: 30px; border-top: 2px solid #475569; padding-top: 10px; }
        .btn-green { background: #10b981; } .btn-red { background: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Admin Terminal</h1>
        <div class="auth-panel">
            <input type="password" id="admin-pass" placeholder="Enter Admin Password">
            <button onclick="loadData()">Authenticate & Load</button>
        </div>

        <div id="dashboard" style="display: none;">
            
            <div class="section">
                <h2>Pending Sign-ups</h2>
                <table>
                    <thead><tr><th>Username</th><th>Action</th></tr></thead>
                    <tbody id="tbl-pending-users"></tbody>
                </table>
            </div>

            <div class="section">
                <h2>Pending Bank Requests</h2>
                <table>
                    <thead><tr><th>User</th><th>Type</th><th>Amount</th><th>Action</th></tr></thead>
                    <tbody id="tbl-bank"></tbody>
                </table>
            </div>

            <div class="section">
                <h2>Gift Code Generator</h2>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="gc-code" placeholder="CODE (e.g. WELCOME)">
                    <input type="number" id="gc-amt" placeholder="Amount">
                    <input type="number" id="gc-uses" placeholder="Uses">
                    <button class="btn-green" onclick="createCode()">Generate Code</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        let pass = '';

        async function loadData() {
            pass = document.getElementById('admin-pass').value;
            const res = await fetch('/api/admin/data', { headers: { 'x-admin-pass': pass } });
            if (!res.ok) return alert('Unauthorized Password');
            const data = await res.json();
            document.getElementById('dashboard').style.display = 'block';

            // Render Users
            const tUsers = document.getElementById('tbl-pending-users'); tUsers.innerHTML = '';
            data.users.filter(u => u.status === 'pending').forEach(u => {
                tUsers.innerHTML += `<tr><td>${u.username}</td><td>
                    <button class="btn-green" onclick="updateUser('${u.username}', 'approved')">Approve</button>
                    <button class="btn-red" onclick="updateUser('${u.username}', 'banned')">Deny</button>
                </td></tr>`;
            });

            // Render Bank
            const tBank = document.getElementById('tbl-bank'); tBank.innerHTML = '';
            data.txs.forEach(tx => {
                tBank.innerHTML += `<tr><td>${tx.username}</td><td>${tx.type.toUpperCase()}</td><td>${tx.amount}</td><td>
                    <button class="btn-green" onclick="resolveTx('${tx._id}', 'approve')">Approve</button>
                    <button class="btn-red" onclick="resolveTx('${tx._id}', 'deny')">Deny</button>
                </td></tr>`;
            });
        }

        async function updateUser(username, status) {
            await fetch('/api/admin/user/status', { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-admin-pass': pass }, body: JSON.stringify({username, status}) });
            loadData();
        }

        async function resolveTx(id, action) {
            await fetch('/api/admin/tx/resolve', { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-admin-pass': pass }, body: JSON.stringify({id, action}) });
            loadData();
        }

        async function createCode() {
            const code = document.getElementById('gc-code').value; const amount = document.getElementById('gc-amt').value; const usesLeft = document.getElementById('gc-uses').value;
            await fetch('/api/admin/giftcode', { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-admin-pass': pass }, body: JSON.stringify({code, amount, usesLeft}) });
            alert("Code Generated!"); document.getElementById('gc-code').value='';
        }
    </script>
</body>
</html>
